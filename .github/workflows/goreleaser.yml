name: goreleaser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
env:
  REGISTRY: docker.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  # Linux 编译与 Docker 镜像构建任务
  goreleaser-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21.4'
      
      - name: Install basic tools
        run: | 
          sudo apt-get update
          sudo apt-get install -y tar gzip wget curl
      
      - name: Install dependencies for cross-compilation
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu build-essential musl-tools
      
      - name: Run GoReleaser (Linux only)
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: '2.1.0'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CGO_ENABLED: 1
          SKIP_MACOS: "true"

      - name: List Folder
        run: |
          ls
          cd dist
          ls

      - name: Get current tag
        run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Check if the tag contains "beta"
        id: check_beta
        run: |
          echo "Is the tag beta? ${GITHUB_REF}" 
          if [[ "${GITHUB_REF}" == *"beta"* ]]; then
            echo "is_beta=true" >> $GITHUB_ENV
          else
            echo "is_beta=false" >> $GITHUB_ENV
          fi

      # 登录到 Docker Hub
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 检查是否应该构建 Docker
      - name: Check if should build Docker
        id: check_docker
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Checking tag: $TAG_NAME"
          
          if echo "$TAG_NAME" | grep -qE "(windows|win|macos|darwin|debug)" && ! echo "$TAG_NAME" | grep -q "all"; then
            echo "Platform-specific tag detected, skipping Docker build"
            echo "skip_docker=true" >> $GITHUB_OUTPUT
          else
            echo "Building Docker for all platforms or 'all' tag"
            echo "skip_docker=false" >> $GITHUB_OUTPUT
          fi

      # 设置 Docker Buildx
      - name: Set up Docker Buildx
        if: steps.check_docker.outputs.skip_docker != 'true'
        uses: docker/setup-buildx-action@v2

      # 构建并推送多架构 Docker 镜像 (Linux amd64 和 arm64)
      - name: Build and Push Docker Image for Multi-Arch
        if: steps.check_docker.outputs.skip_docker != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            mintian/samwaf:${{ env.IMAGE_TAG }}
            mintian/samwaf:beta
            ${{ env.is_beta == 'false' && 'mintian/samwaf:latest' || '' }}
